name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Install JS dependencies
        run: npm ci

      - name: Inject AI default token (si secret défini)
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
        run: |
          if [ -n "$AI_API_KEY" ]; then
            printf "export const DEFAULT_AI_API_KEY = '%s';\n" "$AI_API_KEY" > src/config/secrets.ts
            echo "Token injecté depuis le secret GitHub."
          else
            echo "Pas de secret AI_API_KEY : conservation du token du dépôt."
          fi

      - name: Setup Android SDK components
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "build-tools;36.0.0" \
            "platforms;android-36" \
            "ndk;27.1.12297006" 2>/dev/null || true

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build release APK
        run: cd android && ./gradlew assembleRelease --no-daemon
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - name: Rename APK
        run: |
          mv android/app/build/outputs/apk/release/app-release.apk \
             android/app/build/outputs/apk/release/SmartCourses-${{ github.ref_name }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Smart Courses ${{ github.ref_name }}
          body: |
            ## Smart Courses ${{ github.ref_name }}

            ### Android (recommandé)
            1. Télécharge le fichier `.apk` ci-dessous
            2. Sur ton téléphone Android : Paramètres → Sécurité → Autoriser les sources inconnues
            3. Ouvre le fichier `.apk` pour installer

            ### iOS (IPA non signé)
            Le `.ipa` ci-dessous **n'est pas signé** : il n'est pas installable
            directement. Il faut un outil de sideload (AltStore, Sideloadly…) avec
            ton propre Apple ID. Pour une installation directe, un build signé via
            un compte Apple Developer est nécessaire.

            ---
            *Build généré automatiquement depuis le tag `${{ github.ref_name }}`*
          files: android/app/build/outputs/apk/release/SmartCourses-${{ github.ref_name }}.apk
          fail_on_unmatched_files: true

  ios:
    # Démarre une fois la release Android créée, puis y attache l'IPA iOS.
    needs: android
    # macos-15 fournit Xcode 16.x (React Native exige Xcode >= 16.1).
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.1.app

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install JS dependencies
        run: npm ci

      - name: Inject AI default token (si secret défini)
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
        run: |
          if [ -n "$AI_API_KEY" ]; then
            printf "export const DEFAULT_AI_API_KEY = '%s';\n" "$AI_API_KEY" > src/config/secrets.ts
            echo "Token injecté depuis le secret GitHub."
          else
            echo "Pas de secret AI_API_KEY : conservation du token du dépôt."
          fi

      - name: Setup Ruby (CocoaPods)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: false

      - name: Install CocoaPods
        run: gem install cocoapods

      - name: Pod install
        run: cd ios && pod install --repo-update

      - name: Build archive (sans signature)
        run: |
          xcodebuild \
            -workspace ios/SmartCourses.xcworkspace \
            -scheme SmartCourses \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "$PWD/build/SmartCourses.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            archive

      - name: Package unsigned IPA
        run: |
          mkdir -p build/Payload
          cp -r build/SmartCourses.xcarchive/Products/Applications/SmartCourses.app build/Payload/
          cd build && zip -qr "SmartCourses-${{ github.ref_name }}.ipa" Payload
          ls -lh build/SmartCourses-*.ipa || ls -lh "build/SmartCourses-${{ github.ref_name }}.ipa"

      - name: Attach IPA to release
        uses: softprops/action-gh-release@v2
        with:
          files: build/SmartCourses-${{ github.ref_name }}.ipa
          fail_on_unmatched_files: true
