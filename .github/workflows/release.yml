name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Install JS dependencies
        run: npm ci

      - name: Setup Android SDK components
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "build-tools;36.0.0" \
            "platforms;android-36" \
            "ndk;27.1.12297006" 2>/dev/null || true

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build release APK
        run: cd android && ./gradlew assembleRelease --no-daemon
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - name: Rename APK
        run: |
          mv android/app/build/outputs/apk/release/app-release.apk \
             android/app/build/outputs/apk/release/SmartCourses-${{ github.ref_name }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android/app/build/outputs/apk/release/SmartCourses-${{ github.ref_name }}.apk
          if-no-files-found: error

      # AAB signé pour le Play Store : généré seulement si la keystore d'upload
      # est configurée dans les secrets du dépôt. Sinon l'étape se contente d'un
      # message (la pipeline APK/IPA reste fonctionnelle sans secrets).
      - name: Build signed AAB (Play Store)
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KS_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASS: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_B64" ]; then
            echo "::notice::Secret ANDROID_KEYSTORE_BASE64 absent — AAB signé non généré."
            exit 0
          fi
          echo "$KEYSTORE_B64" | base64 -d > android/app/upload.keystore
          ( cd android && ./gradlew bundleRelease --no-daemon \
              -PSC_UPLOAD_STORE_FILE=upload.keystore \
              -PSC_UPLOAD_STORE_PASSWORD="$KS_PASS" \
              -PSC_UPLOAD_KEY_ALIAS="$KEY_ALIAS" \
              -PSC_UPLOAD_KEY_PASSWORD="$KEY_PASS" )
          mv android/app/build/outputs/bundle/release/app-release.aab \
             "android/app/build/outputs/bundle/release/SmartCourses-${{ github.ref_name }}.aab"
          rm -f android/app/upload.keystore

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: android/app/build/outputs/bundle/release/SmartCourses-${{ github.ref_name }}.aab
          if-no-files-found: ignore

  ios:
    # Démarre une fois la release Android créée, puis y attache l'IPA iOS.
    needs: android
    # macos-15 fournit Xcode 16.x (React Native exige Xcode >= 16.1).
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        # Préfère Xcode 16.1 (minimum requis par RN 0.86) si l'image du runner
        # l'expose encore ; sinon retombe sur le Xcode par défaut de l'image
        # (toujours présent, et plus récent au fil des mises à jour GitHub).
        run: sudo xcode-select -s /Applications/Xcode_16.1.app 2>/dev/null || sudo xcode-select -s /Applications/Xcode.app

      - name: Ensure iOS platform is installed
        run: |
          # Le téléchargement du runtime iOS chez Apple est parfois instable :
          # on réessaie plusieurs fois avant d'abandonner.
          for i in 1 2 3 4; do
            echo "Tentative $i : installation de la plateforme iOS…"
            if sudo xcodebuild -downloadPlatform iOS; then
              echo "Plateforme iOS installée."
              exit 0
            fi
            echo "Échec (réseau Apple instable), nouvelle tentative dans 30 s…"
            sleep 30
          done
          # Dernier recours : on continue, le SDK iPhoneOS est fourni avec Xcode 16.1.
          # L'étape d'archive échouera clairement si la plateforme manque réellement.
          echo "downloadPlatform a échoué après 4 tentatives ; on poursuit malgré tout."

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install JS dependencies
        run: npm ci

      - name: Setup Ruby (CocoaPods)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: false

      - name: Install CocoaPods
        run: gem install cocoapods

      - name: Pod install
        run: cd ios && pod install --repo-update

      - name: Build archive (sans signature)
        run: |
          xcodebuild \
            -workspace ios/SmartCourses.xcworkspace \
            -scheme SmartCourses \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "$PWD/build/SmartCourses.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            archive

      - name: Package unsigned IPA
        run: |
          set -euo pipefail
          APP=$(find build/SmartCourses.xcarchive/Products/Applications -maxdepth 1 -name '*.app' | head -1)
          echo "App trouvée : $APP"
          rm -rf build/Payload
          mkdir -p build/Payload
          cp -R "$APP" build/Payload/
          ( cd build && zip -qr "SmartCourses-${{ github.ref_name }}.ipa" Payload )
          ls -lh "build/SmartCourses-${{ github.ref_name }}.ipa"

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: build

      # L'AAB n'existe que si la keystore est configurée : téléchargement tolérant.
      - name: Download AAB artifact
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: android-aab
          path: build

      - name: Publish release (APK + AAB + IPA)
        uses: softprops/action-gh-release@v2
        with:
          name: Smart Courses ${{ github.ref_name }}
          body: |
            ## Smart Courses ${{ github.ref_name }}

            ### Android — installation directe
            1. Télécharge le fichier `.apk` ci-dessous
            2. Sur ton téléphone Android : Paramètres → Sécurité → Autoriser les sources inconnues
            3. Ouvre le fichier `.apk` pour installer

            ### Android — Play Store
            Le fichier `.aab` (s'il est présent) est l'**App Bundle signé** à
            téléverser sur la Google Play Console. Il n'est généré que si la
            keystore d'upload est configurée dans les secrets du dépôt.

            ### iOS (IPA non signé)
            Le `.ipa` ci-dessous **n'est pas signé** : il n'est pas installable
            directement. Il faut un outil de sideload (AltStore, Sideloadly…) avec
            ton propre Apple ID. Pour une installation directe, un build signé via
            un compte Apple Developer est nécessaire.

            ---
            *Build généré automatiquement depuis le tag `${{ github.ref_name }}`*
          files: |
            build/SmartCourses-${{ github.ref_name }}.apk
            build/SmartCourses-${{ github.ref_name }}.aab
            build/SmartCourses-${{ github.ref_name }}.ipa
          fail_on_unmatched_files: false
